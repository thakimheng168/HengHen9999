    .collab-logos {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      margin-top: 20px;

    .collab-logos img {
      width: 180px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px;
      background-color: #fff;
      transition: transform 0.3s ease;
    }
    .collab-logos img:hover {
      transform: scale(1.05);
    }
    header {
      margin-bottom: 20px;
    }
    header a {
      margin: 0 8px;
      text-decoration: none;
      color: #333;
    }
    footer {

      font-size: 14px;

    }

  <header>
    <a href="#" class="hl"><i class="fa fa-cube"></i> Home</a> |

  <main>
    <div class="tab-content">
      <img src="/IMAGE/scholarship.jpg" alt="Scholarship Banner">
    </div>

    <h2><i class="fa fa-university"></i> Collaboration</h2>
    <div class="collab-logos">
      <img src="/IMAGE/4.png" alt="Partner Logo 1">
      <img src="/IMAGE/5.png" alt="Partner Logo 2">

  </main>

  </footer>
